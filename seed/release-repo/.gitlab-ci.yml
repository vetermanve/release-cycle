# Единый pipeline релиз-трейна (GitOps).
# Desired state: stands/<env> (поезд на стенде) + trains/<DATE>/bt-set.yaml + feature/* + merge/*.
# Любое изменение -> reconcile: пересобрать и задеплоить ПРИВЯЗАННЫЕ стенды
# (master + БТ поезда + merge-ветки), симметрично для dev/test/prepod/prod.
#   ACTION=reconcile (multi-project trigger от feature-пуша / rebuild) -> рефреш привязанных стендов
variables:
  ACTION: ""
  TRAIN_DATE: ""

default:
  image: ci-tools:latest

stages:
  - run

reconcile:
  stage: run
  rules:
    - if: '$ACTION == "reconcile"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
      changes:
        - trains/**/bt-set.yaml
        - stands/**/*
  script:
    - bash tools/reconcile.sh "$TRAIN_DATE"
