# Pipeline релиз-трейна (GitOps).
#   изменился trains/<DATE>/bt-set.yaml -> reconcile (пересборка dev-<DATE>, деплой dev-стенда)
#   изменился stands/<slot>          -> promote (довести ветки и задеплоить test/prepod/prod)
#   ACTION=reconcile (multi-project trigger от feature-пуша) -> reconcile всех открытых поездов
variables:
  ACTION: ""
  TRAIN_DATE: ""

default:
  image: ci-tools:latest

stages:
  - run

reconcile:
  stage: run
  rules:
    - if: '$ACTION == "reconcile"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
      changes:
        - trains/**/bt-set.yaml
  script:
    - bash tools/reconcile.sh "$TRAIN_DATE"

promote:
  stage: run
  rules:
    - if: '$ACTION == "promote"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
      changes:
        - stands/**/*
  script:
    - bash tools/promote.sh
